# The site content is published from the "public" directory.
#
# This is a plain static HTML site. The "@netlify/plugin-gatsby" build plugin
# was enabled on the site (via the Netlify UI) even though this is not a Gatsby
# project. That plugin's onPreBuild fails the build whenever the publish
# directory resolves to the repository root, so we publish from a dedicated
# subdirectory and tell the plugin to skip its work.
[build]
  publish = "public"
  # Regenerate the JSON-driven pages on every deploy. The source of truth lives
  # in public/data/*.json, and these scripts render that JSON into the
  # per-service pages (public/services/<slug>.html) and per-city pages
  # (public/handyman/<slug>.html).
  command = "node scripts/build-service-pages.mjs && node scripts/build-city-pages.mjs"

[build.environment]
  # Skip the Gatsby build plugin — this is not a Gatsby site.
  NETLIFY_SKIP_GATSBY_BUILD_PLUGIN = "true"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://app.netlify.com"

# HTML: let the CDN serve stale content while it revalidates in the background.
# Netlify-CDN-Cache-Control controls only the CDN edge and is stripped before
# the browser, so pages still update quickly for visitors.
[[headers]]
  for = "/"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=0, stale-while-revalidate=86400"

[[headers]]
  for = "/*.html"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=0, stale-while-revalidate=86400"

# Static assets: cache aggressively at the browser and the CDN.
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.avif"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
